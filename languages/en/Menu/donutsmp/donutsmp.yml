id: donutsmp

title: "<black>Place items here to sell"

size: 54

sell-slots:
  - '0-53'


on_close:
  - check1:
      if: "%sell_pay% > 0"
      then:
        - '[sell_all]'
        - '[message] <white>Sold items for <red>$%sell_pay% <white>and earned <yellow>%sell_score% points'
        - '[sound] entity.player.levelup'
      else:
        - '[sound] block.dripstone_block.break'
        - '[message] <gray>Nothing to sell'

Items: []
